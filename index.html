<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Banner chữ gõ máy Google Sites</title>
<style>
/* Cấu hình toàn bộ màn hình của iFrame */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent; /* Để nền trong suốt, ăn theo nền Google Sites */
}

/* Khung chứa dùng Flexbox để ép chữ luôn vào giữa */
.container {
    display: flex;
    justify-content: center; /* Căn giữa theo chiều ngang */
    align-items: center;     /* Căn giữa theo chiều dọc */
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 10px;
}

.typewriter-text {
    font-size: 14px;         /* Giảm nhẹ size để vừa với các khung banner nhỏ */
    font-weight: bold;
    color: #000000;          /* Màu chữ đen */
    text-align: center;      /* Căn giữa các dòng chữ với nhau */
    line-height: 1.5;
    
    /* Cho phép chữ tự động xuống dòng khi hết khung */
    white-space: normal;     
    word-wrap: break-word;

    /* Hiệu ứng hiện chữ mượt mà thay vì gõ kiểu kéo dài chiều rộng */
   animation: 
        typing 8s steps(105) forwards,
        blink 0.75s step-end infinite;
}

/* Bạn có thể thêm hiệu ứng xuất hiện nhẹ nhàng cho toàn bộ câu chữ */
@keyframes textEffect {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>
<div class="container">
<p class="typewriter-text">
"Không có gì quý hơn độc lập, tự do."<br>— Nơi lưu giữ, lan tỏa những giá trị tư tưởng, đạo đức và phong cách Hồ Chí Minh.
</p>
</div>
</body>
</html>
