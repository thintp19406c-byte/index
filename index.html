<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Banner chữ chạy</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:white;
}
.marquee{
    width:100%;
    overflow:hidden;
    white-space:nowrap;
}
.marquee span{
    display:inline-block;
    padding-left:100%;
    font-size:32px;
    font-weight:bold;
    color:#d40000;
    animation:run 12s linear infinite;
}
@keyframes run{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}
</style>
</head>

<body>
<div class="marquee">
<span>🇻🇳 "Không có gì quý hơn độc lập, tự do." — Nơi lưu giữ, lan tỏa những giá trị tư tưởng, đạo đức 
và phong cách Hồ Chí Minh. 🇻🇳</span>
</div>
</body>
</html>
